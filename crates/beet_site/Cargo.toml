[package]
name = "beet_site"
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
readme.workspace = true
description = "The beet website, built with beet"
documentation.workspace = true
homepage.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true


[features]
default = ["web", "terminal"]

# Shared render substrate: the router, template system, markdown content and the
# style rule set, used by both render targets. Page bodies and layouts live here.
# `json` brings the batteries-included `default_router` (`/app-info`,
# `POST /analytics`).
render = ["beet/router", "beet/template", "beet/markdown", "beet/style", "beet/json", "beet/syntax_highlighting"]

# Web render target: the document shell + HTTP server + `HtmlRenderer`.
web = ["render", "beet/http_server"]

# Terminal render target: the charcell pipeline (`CharcellPlugin` + stdio host).
terminal = ["render", "beet/terminal"]

# CLI mode: render a single route to stdout and exit, picking HTML or ANSI via
# `--accept`. Overrides the default HTTP server without needing
# `--no-default-features`. Pulls in both render targets so either output works.
cli = ["web", "terminal"]

# Build-time route codegen. Compiles without the generated `src/codegen` modules
# so it can bootstrap them: `cargo run -p beet_site --no-default-features
# --features codegen`. Run this before a `web`/`terminal` build.
codegen = ["beet/codegen"]

# Deployment knobs, layered onto the web target.
native-tls = ["web", "beet/native-tls"]
lambda = ["web", "beet/lambda"]

[dependencies]
serde.workspace = true
beet.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }

[dev-dependencies]
serde_json.workspace = true
futures.workspace = true
beet = { workspace = true, features = ["testing"] }

# the `beet` test runner replaces libtest's harness
[[test]]
name = "render"
path = "tests/render.rs"
harness = false

[[test]]
name = "sidebar_tree"
path = "tests/sidebar_tree.rs"
harness = false
