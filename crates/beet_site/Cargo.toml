[package]
name = "beet_site"
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
readme.workspace = true
description = "The beet website, built with beet"
documentation.workspace = true
homepage.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true


[features]
default = ["web", "terminal"]

# Shared render substrate: the router, scene system, markdown content and the
# style rule set, used by both render targets. Page bodies and layouts live here.
# `json` brings the batteries-included `default_router` (`/app-info`,
# `POST /analytics`).
render = ["beet/router", "beet/scene", "beet/markdown", "beet/style", "beet/json"]

# Web render target: the document shell + HTTP server + `HtmlRenderer`.
web = ["render", "beet/http_server"]

# Terminal render target: the charcell pipeline (`CharcellPlugin` + stdio host).
terminal = ["render", "beet/terminal"]

# Build-time route codegen. Compiles without the generated `src/codegen` modules
# so it can bootstrap them: `cargo run -p beet_site --no-default-features
# --features codegen`. Run this before a `web`/`terminal` build.
codegen = ["beet/codegen"]

# Deployment knobs, layered onto the web target.
native-tls = ["web", "beet/native-tls"]
lambda = ["web", "beet/lambda"]

# The nightly `custom_test_frameworks` test-runner path. Off by default, so the
# test suites run on stable via the `inventory` runner; `--all-features` on
# nightly turns it on for the libtest harness.
custom_test_frameworks = ["beet/custom_test_frameworks"]

[dependencies]
serde.workspace = true
beet.workspace = true
# the `#[scene]` macro emits `::bevy::` paths, so the crate root needs `bevy`.
bevy.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }

[dev-dependencies]
serde_json.workspace = true
futures.workspace = true
beet = { workspace = true, features = ["testing"] }
