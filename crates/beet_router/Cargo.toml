[package]
name = "beet_router"
version.workspace = true
edition.workspace = true
description = "An opinionated semantic layer between applications and interfaces"
documentation.workspace = true
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true


[features]
default = ["markdown"]
interface = ["serde"]
json = ["serde", "beet_core/json", "beet_net/json"]
postcard = ["serde", "beet_core/postcard", "beet_net/postcard"]
serde = ["dep:serde"]
tui = ["dep:bevy_ratatui", "dep:ratatui"]
markdown = ["dep:pulldown-cmark"]
http = ["beet_net/server"]
bevy_scene = ["beet_core/bevy_scene","bevy/bevy_scene", "serde"]

[dependencies]
beet_core.workspace = true
beet_node.workspace = true
beet_action.workspace = true
beet_net.workspace = true
bevy.workspace = true
extend.workspace = true
thiserror.workspace = true
variadics_please.workspace = true
bitflags = "2"

serde = {workspace = true, optional=true}

pulldown-cmark = { version = "0.13", optional = true }

webbrowser.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bevy_ratatui = {workspace = true, optional=true,features=["crossterm"]}
ratatui = {workspace = true, optional=true, features=["crossterm", "unstable-rendered-line-info"]}

[dev-dependencies]
beet_core = { workspace = true, features = ["testing"] }


[target.'cfg(target_arch = "wasm32")'.dev-dependencies]




