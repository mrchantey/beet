[package]
name = "beet_router"
version.workspace = true
edition.workspace = true
description = "An opinionated semantic layer between applications and interfaces"
documentation.workspace = true
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true


[features]
default = ["std", "markdown"]
# The std render surface: the scene-rendering router pieces (help/navigate scene
# routes + rendering via `beet_ui`), media parsing, sidebar, help, the route tree,
# the runtime BSX parser, and the system-browser link opener (`open_link`, native
# only). Wasm-safe (eg the Cloudflare Worker render target): it deliberately omits
# the native-only filesystem store / http transport, which ride the separate
# `fs`/`http` features the native `router` pulls. The no_std core (route tree, path
# patterns, navigation, standalone middleware, server-action client) builds with this off.
std = [
	"beet_core/std",
	"beet_action/std",
	"beet_action/reflect",
	"beet_net/std",
	# the std surface (scene routes, render negotiation, stores) is
	# serde-saturated, mirroring beet_net's `std â†’ serde`
	"serde",
	"dep:beet_ui",
	"beet_ui/net",
	# markup parsing for media negotiation routes `MediaType::Html` through BSX.
	"bsx",
	# the std-gated `open_link` opens external links in the system browser on
	# native (the wasm render target uses `window.open`). `webbrowser` lives in the
	# non-wasm target table, so this activates it only off wasm; the no_std embedded
	# router leaves `std` off, keeping `webbrowser`/`url`/std out of the firmware.
	"dep:webbrowser",
]
# The native-only filesystem store + http transport, layered onto `std`. The
# native `router` enables this; the wasm render target leaves it off. (The
# `webbrowser` link opener rides `std` itself, off wasm â€” see the `std` feature.)
native = ["std", "beet_net/fs", "beet_net/http"]
# The S3-backed store, native-only. Lets the no-code asset route (`AssetsStore`)
# bind a dedicated `BEET_ASSETS_BUCKET` bucket in a deployed container.
aws_sdk = ["std", "beet_net/aws_sdk"]
interface = ["serde"]
# The BSX markup parser, forwarded to `beet_ui` (which delegates to the core
# parser). Routes `MediaType::Html` parsing through BSX for media negotiation.
bsx = ["std", "beet_ui/bsx"]
json = ["serde", "dep:serde_json", "beet_core/json", "beet_net/json"]
postcard = ["serde", "beet_core/postcard", "beet_net/postcard"]
serde = ["dep:serde", "beet_core/serde", "beet_action/serde", "beet_net/serde"]
markdown = ["std", "dep:pulldown-cmark"]
markdown_parser = ["std", "beet_ui/markdown_parser"]
# The live, interactive terminal target: the charcell TUI host + stdio terminal,
# behind which the in-world `Navigator` browses the app's own routes (`TuiServer`).
tui = ["std", "beet_ui/tui"]
# The multi-tenant SSH-TUI server (`SshTuiServer`): serves each SSH connection its
# own navigable terminal, all browsing the same router, alongside the http server.
ssh = ["tui", "beet_net/russh_server"]
http = ["std", "beet_net/server"]
# The server-to-client websocket channel (`ClientIo`) and the dev-mode
# `LiveReload` watcher built on it. Native-only: no HTTP backend supports
# websocket upgrades, so the channel runs a tungstenite listener on its own
# port beside the HTTP server.
client_io = ["http", "beet_net/tungstenite"]
# beet_router's only template_serde use is rebuilding route trees on a
# `TemplateLoaded` event, which comes from `beet_core/template_serde` (beet's
# own fork). It does NOT need bevy's `bevy_world_serialization` feature, which
# drags in `bevy_asset` (std) and so breaks no_std consumers.
# `beet_core/rsx`: the `SceneServer` meta-route bundle is a `#[template]`, whose
# attribute macro is rsx-gated; scene_server compiles wherever template_serde is on.
template_serde = ["beet_core/template_serde", "beet_core/rsx", "serde"]
# Generic scripting registration (the `Script`/`ExchangeScript`/`ScriptEntry`
# reflect types). Backend-agnostic; pair with a backend (eg `rhai`) for a working
# runtime, and `json` for the `ScriptEntry` console entry action.
scripting = ["std", "beet_action/scripting", "serde"]
# rhai backend for the scripting registrations above.
rhai = ["scripting", "beet_action/rhai"]
# quickjs backend. `json` also enables the `ScriptEntry` console-capturing entry
# action (the `<script>` flavor; native runs the default backend, wasm the host realm).
quickjs = ["scripting", "json", "beet_action/quickjs"]
# Build-time code generation: route tree, server/client actions, typed links.
# `markdown_parser` lets the collection scan read content frontmatter so blob
# routes are emitted with their scan-time `ArticleMeta`.
codegen = [
	"std",
	"serde",
	"markdown_parser",
	"beet_core/tokens",
	"beet_net/tokens",
	"dep:syn",
	"dep:quote",
	"dep:proc-macro2",
	"dep:prettyplease",
	"dep:heck"
]

[dependencies]
beet_core = { workspace = true, default-features = false, features = ["bevy_async"] }
beet_action = { workspace = true, default-features = false }
beet_net = { workspace = true, default-features = false }
# std-only: the template/render pipeline backing template routes, media, help, sidebar.
beet_ui = { workspace = true, optional = true, features = ["action", "template"] }
bevy.workspace = true
extend.workspace = true
thiserror.workspace = true
variadics_please.workspace = true
bitflags = "2"

serde = {workspace = true, optional=true}
serde_json = {workspace = true, optional=true}

pulldown-cmark = { version = "0.13", optional = true }

#đź’ˇ codegen
syn = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
proc-macro2 = { workspace = true, optional = true }
prettyplease = { workspace = true, optional = true }
heck = { workspace = true, optional = true }

# the system-browser link opener (`open_external_link`). Optional, enabled by the
# `std` feature (the std render surface compiles `open_link`), and in the non-wasm
# target table â€” the wasm render target records the open intent via the event but
# has no system browser, so it is excluded there. Optional so the no_std embedded
# router (`std` off) keeps `webbrowser`/`url`/std out of the firmware build.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
webbrowser = { workspace = true, optional = true }

[dev-dependencies]
beet_core = { workspace = true, features = ["testing"] }


[target.'cfg(target_arch = "wasm32")'.dev-dependencies]




# [[test]]
# name = "interface"
# path = "tests/interface.rs"
# required-features = ["interface"]

[[test]]
name = "bsx_site"
path = "tests/bsx_site.rs"
harness = false
required-features = ["markdown_parser"]

[lib]
harness = false
