[package]
name = "beet_router"
version.workspace = true
edition.workspace = true
description = "An opinionated semantic layer between applications and interfaces"
documentation.workspace = true
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true


[features]
default = ["markdown"]
interface = ["serde"]
json = ["serde", "dep:serde_json", "beet_core/json", "beet_net/json"]
postcard = ["serde", "beet_core/postcard", "beet_net/postcard"]
serde = ["dep:serde"]
tui = ["dep:bevy_ratatui", "dep:ratatui"]
markdown = ["dep:pulldown-cmark"]
html_parser = ["beet_ui/html_parser"]
markdown_parser = ["html_parser", "beet_ui/markdown_parser"]
http = ["beet_net/server"]
bevy_scene = ["beet_core/bevy_scene","bevy/bevy_world_serialization", "serde"]
scripting = ["beet_action/scripting", "serde"]
# Build-time code generation: route tree, server/client actions, typed links.
codegen = [
	"serde",
	"beet_core/tokens",
	"beet_net/tokens",
	"dep:syn",
	"dep:quote",
	"dep:proc-macro2",
	"dep:prettyplease",
	"dep:heck"
]

[dependencies]
beet_core = { workspace = true, features = ["std"] }
beet_ui = { workspace = true, features = ["action"] }
beet_action.workspace = true
beet_net.workspace = true
bevy.workspace = true
extend.workspace = true
thiserror.workspace = true
variadics_please.workspace = true
bitflags = "2"

serde = {workspace = true, optional=true}
serde_json = {workspace = true, optional=true}

pulldown-cmark = { version = "0.13", optional = true }

#💡 codegen
syn = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
proc-macro2 = { workspace = true, optional = true }
prettyplease = { workspace = true, optional = true }
heck = { workspace = true, optional = true }

webbrowser.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bevy_ratatui = {workspace = true, optional=true,features=["crossterm"]}
ratatui = {workspace = true, optional=true, features=["crossterm", "unstable-rendered-line-info"]}

[dev-dependencies]
beet_core = { workspace = true, features = ["testing"] }


[target.'cfg(target_arch = "wasm32")'.dev-dependencies]




# [[test]]
# name = "interface"
# path = "tests/interface.rs"
# required-features = ["interface"]

[lib]
harness = false
