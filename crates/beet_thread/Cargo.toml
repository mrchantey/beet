[package]
name = "beet_thread"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
readme.workspace = true
description = "Thread and conversation types for bevy applications"
documentation.workspace = true
homepage.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true

[features]
default = ["fs","action","agent"]
nightly = []
rustls-tls = ["beet_net/rustls-tls"]
native-tls = ["beet_net/native-tls"]
world_serde = ["beet_net/world_serde", "beet_core/world_serde"]
fs = ["beet_core/fs"]
action = ["dep:beet_action"]
agent = ["dep:async-openai"]

[dependencies]
beet_net = { workspace = true, features = ["std", "serde", "fs", "http", "ureq", "json"] }
beet_core = { workspace = true, features = ["std", "serde","bevy_reflect_documentation"] }
beet_router = { workspace = true, features = ["json"] }
beet_action = { workspace = true, optional = true, features = ["std", "reflect", "json"] }
bevy.workspace = true
uuid = { workspace = true, features = ["std", "v7", "js"] }
async-openai = { version = "0.34", optional=true, default-features=false, features=["chat-completion-types"] }
serde.workspace = true
futures.workspace = true
strum.workspace = true
thiserror.workspace = true
async-lock.workspace = true
base64.workspace = true
serde_json.workspace = true
serde_with = "3.12"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
#https://rustwasm.github.io/wasm-bindgen/api/web_sys/
#https://github.com/rustwasm/wasm-bindgen/blob/main/crates/web-sys/Cargo.toml
web-sys = { workspace = true, features = [
	# WebRtc
	'Window',
	'Navigator',
	'MediaDevices',
	'MediaStream',
	'MediaStreamConstraints',
	'RtcPeerConnection',
	'RtcDataChannel',
	'RtcDataChannelInit',
	'RtcSessionDescriptionInit',
	'RtcSdpType',
	'RtcTrackEvent',
	'HtmlAudioElement',
	'RtcRtpSender',
	'MediaStreamTrack',
] }


[dev-dependencies]
beet_core = { workspace = true, features = ["testing", "fs", "rand"] }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
beet_thread = { path = ".", features = ["native-tls"] }

[lib]
harness = false

[[test]]
name = "control_flow"
path = "tests/control_flow.rs"
harness = false

[[test]]
name = "fs_tool_call"
path = "tests/fs_tool_call.rs"
harness = false

[[test]]
name = "gemini"
path = "tests/gemini.rs"
harness = false

[[test]]
name = "ollama"
path = "tests/ollama.rs"
harness = false

[[test]]
name = "openai"
path = "tests/openai.rs"
harness = false
