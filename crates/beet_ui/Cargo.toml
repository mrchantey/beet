[package]
name = "beet_ui"
version.workspace = true
edition.workspace = true
description = "Agnostic structured data representations in Bevy ECS"
documentation.workspace = true
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[[example]]
name = "render_simple"
path = "examples/render_simple.rs"
required-features = ["style"]

[[example]]
name = "tui"
path = "examples/tui.rs"
required-features = ["tui", "style"]

[[example]]
name = "term_input"
path = "examples/term_input.rs"
required-features = ["tui"]

[[example]]
name = "build_css"
path = "examples/build_css.rs"
required-features = ["style"]

[[example]]
name = "showcase"
path = "examples/showcase.rs"
required-features = ["template", "style"]

# measures the real terminal via crossterm, so requires the `tui` feature
[[example]]
name = "layout"
path = "examples/layout.rs"
required-features = ["tui"]


[features]
default = ["std","rsx", "style", "template", "bsx"]
std = []
# Backend-agnostic keyboard input: the `FocusPlugin` reads bevy `KeyboardInput`
# messages and routes them to the focused entity's `Value`. Opt-in so a plain
# `beet_ui` build does not pull `bevy/keyboard`. Terminal renderers enable it.
keyboard = ["std", "beet_core/bevy_keyboard"]
action = ["dep:beet_action", "net"]
# The `beet_net` integration beet_ui needs: the std `BlobStore` + serde. wasm-safe
# — it deliberately omits the native-only `fs`/`http` (a render/document consumer
# does not touch the filesystem store or the http transport directly; native
# consumers pull those through `beet_router/std`).
net = ["std", "dep:beet_net", "beet_net/std", "beet_net/serde", "beet_net/action"]
tokens = ["beet_core/tokens"]
rsx = ["beet_core/rsx"]
# The function-component widget layer: `#[template]` widgets and the `rsx!`
# lowering-target node runtime. std-only, so it is opt-in; beet_core's no_std
# core stays free of it.
template = ["std", "rsx", "style"]
style = ["json", "dep:material-colors", "beet_core/bevy_color", "dep:heck", "dep:bitflags"]
serde = ["dep:serde"]

tui = ["style", "keyboard", "dep:vte", "dep:libc", "dep:base64", "dep:image", "dep:resvg", "beet_core/ctrlc", "beet_core/crossterm", "beet_core/bevy_mouse", "beet_core/bevy_window"]

json = ["dep:serde_json", "serde", "beet_core/json"]
postcard = ["dep:postcard", "serde", "beet_core/postcard"]
# The markdown / MDX parser. Owns the prose structure and the diff engine (the
# `diff` submodule), and parses embedded markup through the core BSX fragment
# primitive (`parse_fragment`), so BSX is the single markup authority and an
# embedded component/template/`bx:` resolves per-tag through the BSX resolver.
markdown_parser = ["bsx", "dep:pulldown-cmark"]
# The `beet_ui` BSX front-end: a thin `NodeParser` delegating to the core BSX
# parser (`beet_core/bsx`), plus the default `bx:click` event/verb registration.
# HTML dispatches to the same parser with its features disabled, for both
# `MediaType::Bsx` and `MediaType::Html`. std-only, since it builds through the
# `template` substrate and wires picking-based events.
bsx = ["template", "beet_core/bsx"]
syntax_highlighting = [
	"style",
	"dep:tree-sitter",
	"dep:tree-sitter-rust",
	"dep:tree-sitter-javascript",
	"dep:tree-sitter-json",
	"dep:tree-sitter-html",
	"dep:streaming-iterator"
]

template_serde = ["beet_core/template_serde", "serde"]

[dependencies]
beet_core = { workspace = true, features = ["std"] }
beet_net = { workspace = true, optional = true }
beet_action = { workspace = true, optional = true, features = ["std", "reflect"] }
bevy.workspace = true
extend.workspace = true
bytes.workspace = true
libc = { workspace = true, optional = true }
vte = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
# terminal raster decoding: a non-PNG `<img>` (eg a `.jpg`) is decoded and
# re-encoded to PNG for the kitty `f=100` transmit. PNG + common web formats only.
image = { version = "0.25", optional = true, default-features = false, features = ["png", "jpeg", "gif", "webp"] }
# terminal SVG rasterisation: an `<img src=*.svg>` is rendered to an RGBA pixmap
# (resvg bundles usvg + tiny-skia) and PNG-encoded for the kitty `f=100`
# transmit, so a vector figure draws in the terminal like any other raster. The
# default features include text layout + system fonts, which the deck's labelled
# diagrams need; it tracks the tiny-skia 0.11 / ttf-parser 0.25 line already in
# the tree, so it adds no duplicate graphics deps.
resvg = { version = "0.45", optional = true }
serde = { workspace = true, optional = true }
pulldown-cmark = { version = "0.13", optional = true, features = ["html"] }
serde_json = { workspace = true, optional = true }
postcard = { workspace = true, optional = true }
heck = { workspace = true, optional = true }
bitflags = { workspace = true, optional = true }
thiserror.workspace = true
variadics_please.workspace = true
webbrowser.workspace = true
material-colors = {version = "0.4.2", optional = true }


# tree-sitter grammars are C parsers that don't cross-compile to wasm
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libc = {workspace = true, optional = true}
tree-sitter = { version = "0.26", optional = true }
tree-sitter-rust = { version = "0.24", optional = true }
tree-sitter-javascript = { version = "0.25", optional = true }
tree-sitter-json = { version = "0.24", optional = true }
tree-sitter-html = { version = "0.23", optional = true }
streaming-iterator = { version = "0.1", optional = true }


[dev-dependencies]
beet_core = { workspace = true, features = ["testing", "fs", "rand"] }
beet_net = { workspace = true, features = ["std", "serde", "fs", "http", "server"] }

# the wasm/deno reactivity-runtime test evaluates `REACTIVITY_JS` and drives it
[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
js-sys = { workspace = true }
wasm-bindgen = { workspace = true }

[lib]
harness = false

[[test]]
name = "template"
path = "tests/template.rs"
harness = false
required-features = ["template"]

[[test]]
name = "widgets"
path = "tests/widgets.rs"
harness = false
required-features = ["template"]

[[test]]
name = "bsx"
path = "tests/bsx.rs"
harness = false
required-features = ["bsx"]

[[test]]
name = "schema"
path = "tests/schema.rs"
harness = false
required-features = ["bsx", "json"]

