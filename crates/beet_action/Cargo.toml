[package]
name = "beet_action"
version.workspace = true
edition.workspace = true
description = "Entities as async functions."
documentation.workspace = true
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = ["reflect"]
serde = ["dep:serde", "beet_core/serde", "bitflags/serde"]
json = ["serde","dep:serde_json","beet_core/json"]
world_serde = ["beet_core/world_serde"]
reflect = ["beet_core/bevy_reflect_documentation"]
scripting = ["rhai"]
rhai = ["dep:rhai", "serde"]

[dependencies]
beet_core = { workspace = true, features = ["std"] }
bevy = { workspace = true, features = ["bevy_color"] }
bitflags.workspace = true
extend.workspace = true
thiserror.workspace = true
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
rhai = { workspace = true, optional = true }
[dev-dependencies]
beet_action = { path = ".", features= ["world_serde", "scripting"] }
beet_core = { workspace = true, features = ["testing"] }

[lib]
harness = false
