[package]
name = "beet_action"
version.workspace = true
edition.workspace = true
description = "Entities as async functions."
documentation.workspace = true
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = ["std", "reflect"]
# rhai's std mode follows ours: a std build links rhai's std, so engine-only
# consumers get a usable rhai. no_std consumers (eg `beet_esp`) leave `std` off
# and select rhai's `no_std` mode on their own dependency edge, keeping the
# `rhai` feature mode-agnostic so it never collides under `--all-features`.
std = ["beet_core/std", "rhai?/std"]
serde = ["dep:serde", "beet_core/serde", "bitflags/serde"]
json = ["serde", "dep:serde_json", "beet_core/json"]
world_serde = ["beet_core/world_serde"]
reflect = ["beet_core/bevy_reflect_documentation"]
scripting = ["std", "rhai"]
rhai = ["dep:rhai", "serde", "std"]

[dependencies]
beet_core = { workspace = true, default-features = false, features = ["bevy_async"] }
bevy = { workspace = true, features = ["bevy_color"] }
bitflags.workspace = true
extend.workspace = true
thiserror.workspace = true
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
rhai = { workspace = true, optional = true }
[dev-dependencies]
beet_action = { path = ".", features= ["world_serde", "scripting"] }
beet_core = { workspace = true, features = ["testing", "ron"] }

[lib]
harness = false
