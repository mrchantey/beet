[package]
name = "beet_spatial"
version = { workspace = true }
edition = { workspace = true }
description = "Spatial actions built upon beet_action"
documentation = { workspace = true }
readme = "README.md"
homepage = { workspace = true }
repository = { workspace = true }
license = { workspace = true }
keywords = { workspace = true }
categories = { workspace = true }

[features]
default = ["std"]
# std-only beet_core features (path types, runtime drivers, ..) — beet_action
# also forces std today, so the no_std beet_spatial build is gated on
# beet_action gaining a real no_std mode (see beet_action_no_std.md).
std = ["beet_core/std"]
bevy_default = ["bevy/default", "beet_core/bevy_default"]

[dependencies]
beet_action.workspace = true
beet_core = { workspace = true, default-features = false, features = ["bevy_async", "rand"] }

bevy.workspace = true

extend.workspace = true
log.workspace = true
strum.workspace = true
strum_macros.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys.workspace = true

[dev-dependencies]
beet_core = { workspace = true, features = ["testing"] }

[lib]
harness = false
