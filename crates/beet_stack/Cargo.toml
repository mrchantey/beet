[package]
name = "beet_stack"
version.workspace = true
edition.workspace = true
description = "An opinionated semantic layer between applications and interfaces"
documentation.workspace = true
readme = "README.md"
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true


[features]
default = ["interface", "tui", "markdown"]
interface = ["serde"]
serde = ["dep:serde","beet_core/json","beet_core/postcard","beet_net/json","beet_net/postcard"]
tui = ["interface", "dep:bevy_ratatui", "dep:ratatui"]
markdown = ["dep:pulldown-cmark"]
http = ["beet_net/server"]
bevy_scene = ["beet_core/bevy_scene","bevy/bevy_scene", "serde"]

[dependencies]
beet_core = { workspace = true }
beet_net.workspace = true
beet_tool.workspace = true
bevy.workspace = true
extend.workspace = true
thiserror.workspace = true
variadics_please.workspace = true
bitflags = "2"

serde = {workspace = true, optional=true}
bevy_ratatui = {workspace = true, optional=true}
ratatui = {workspace = true, optional=true, features=["crossterm", "unstable-rendered-line-info"]}

pulldown-cmark = { version = "0.13", optional = true }

webbrowser.workspace = true

[dev-dependencies]
beet_core = { workspace = true, features = ["testing"] }


[target.'cfg(target_arch = "wasm32")'.dev-dependencies]




[[test]]
name = "interface"
path = "tests/interface.rs"
required-features = ["interface"]
