[package]
name = "beet_core_macros"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
readme.workspace = true
description = "Macros for beet_core"
documentation.workspace = true
homepage.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true


[lib]
proc-macro = true

[features]
default = ["slot"]
rsx = ["dep:rstml"]
# Hoist `<slot>` markup into scene props: the `#[scene]` macro injects a
# `SceneProp` field per slot and `rsx!` lowers `<slot name="x"/>` to that prop.
slot = []
# When enabled the `#[beet::test]` macro additionally emits a libtest
# `#[test]` fn so the nightly `custom_test_frameworks` harness can collect
# it. The `inventory` registration is always emitted regardless.
custom_test_frameworks = []

[dependencies]
beet_core_shared.workspace = true
syn.workspace = true
quote.workspace = true
proc-macro2.workspace = true
proc-macro2-diagnostics.workspace = true
heck.workspace = true
rstml = { version = "0.12", features = ["rawtext-stable-hack"], optional = true }
