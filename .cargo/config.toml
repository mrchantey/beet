[build]
# recommended for cargo test --workspace
# jobs = 8

[target.wasm32-unknown-unknown]
# wasm runner for cargo run and cargo test
# uncomment during development
# runner = 'cargo run -p beet-cli -- run-wasm'
runner = 'beet run-wasm'
# Bump the wasm stack from LLD's 1MB default. A feature-heavy bevy `App` future
# built at `opt-level=0` (the test profile) overflows 1MB and traps with a
# "memory access out of bounds" on the first poll.
# `getrandom_backend="wasm_js"`: getrandom 0.3 (pulled via fastrand/ahash) has no
# wasm32 backend by default; select its WebCrypto backend so the browser / worker
# build links (the workspace enables its `wasm_js` feature alongside this cfg).
rustflags = [
	'-C', 'link-arg=-zstack-size=16777216',
	'--cfg', 'getrandom_backend="wasm_js"',
]

# Bare no_std target (esp32 etc). getrandom 0.3 has no built-in backend here, so
# select its `custom` backend — the downstream embedded adapter provides the
# `__getrandom_v03_custom` entropy symbol at link time (alongside the embassy
# executor, `time_ext::set_now`, `Instant::set_elapsed`, `set_http_client`).
[target.riscv32imac-unknown-none-elf]
rustflags = ['--cfg', 'getrandom_backend="custom"']

[env]
WORKSPACE_ROOT = { value = "", relative = true }
# A fresh release build of the deep beet type graph overflows rustc's default
# codegen-thread stack and SIGSEGVs (eg a bare `cargo install --path
# crates/beet-cli`). The justfile exports the same value for its recipes; setting
# it here covers cargo invocations run outside `just` too. Not forced, so an
# explicit override still wins.
RUST_MIN_STACK = { value = "1073741824" }
