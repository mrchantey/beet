path = "tests/thread_scenes.rs"
harness = false
required-features = ["thread", "router", "fs", "testing"]

# The no-code `examples/bsx_site` example, loaded on-disk and rendered/navigated
# through `beet`'s public API. The example is pure `.bsx`/`.md` (not a crate); its
# render + live-tui suites live here, run via `beet --main=examples/bsx_site/main.bsx`.
[[test]]
name = "bsx_site"
path = "tests/bsx_site.rs"
harness = false
required-features = ["router", "style", "markdown", "fs", "http_server", "testing"]

[[test]]
